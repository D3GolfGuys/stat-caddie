<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account — Stat Caddie</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app-shell">
  <nav id="app-nav">
    <a href="/app/index.html" class="nav-logo">⛳ Stat <span>Caddie</span></a>
    <div id="nav-user">
      <span class="user-name" id="nav-user-name"></span>
      <a href="/app/account.html" class="nav-icon-btn">⚙ Account</a>
      <button class="nav-icon-btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <div id="app-body">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Tools</div>
        <a href="/app/capture.html" class="sidebar-link"><span class="icon">🖥️</span> Desktop Capture</a>
        <a href="/app/mobile.html"  class="sidebar-link"><span class="icon">📱</span> Mobile Capture</a>
        <a href="/app/reports.html" class="sidebar-link"><span class="icon">📊</span> Stats Reports</a>
      </div>
      <div class="sidebar-section team-admin-only" style="display:none;">
        <div class="sidebar-label">Team</div>
        <a href="/app/team.html" class="sidebar-link"><span class="icon">👥</span> Team Roster</a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Account</div>
        <a href="/app/account.html" class="sidebar-link active"><span class="icon">👤</span> My Account</a>
      </div>
    </div>
    <main id="app-main">
      <div class="page-title">My Account</div>
      <div class="page-sub">Manage your profile and subscription.</div>

      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">

        <!-- Profile -->
        <div class="card">
          <h3 style="font-size:15px;font-weight:700;color:var(--green-dark);margin-bottom:16px;">Profile</h3>
          <div class="form-group"><label>Name</label><input type="text" id="profile-name"></div>
          <div class="form-group"><label>Email</label><input type="email" id="profile-email" disabled style="background:#f8f8f8;color:#888;"></div>
          <button class="btn btn-primary btn-sm" onclick="saveProfile()">Save Changes</button>
          <div id="profile-msg" style="margin-top:8px;font-size:13px;"></div>
        </div>

        <!-- Subscription -->
        <div class="card">
          <h3 style="font-size:15px;font-weight:700;color:var(--green-dark);margin-bottom:16px;">Subscription</h3>
          <div style="margin-bottom:12px;">
            <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Plan</div>
            <div id="sub-plan" style="font-size:16px;font-weight:700;color:var(--green-dark);"></div>
          </div>
          <div style="margin-bottom:20px;">
            <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">Status</div>
            <div id="sub-status"></div>
          </div>
          <button class="btn btn-outline btn-sm" onclick="openBillingPortal()" id="billing-btn">Manage Billing →</button>
          <div id="sub-inactive-msg" style="display:none;margin-top:12px;">
            <a href="/register.html" class="btn btn-gold btn-sm">Reactivate Subscription</a>
          </div>
        </div>

        <!-- Change Password -->
        <div class="card">
          <h3 style="font-size:15px;font-weight:700;color:var(--green-dark);margin-bottom:16px;">Change Password</h3>
          <div class="form-group"><label>New Password</label><input type="password" id="new-password" placeholder="8+ characters" minlength="8"></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" id="confirm-password" placeholder="Repeat password"></div>
          <button class="btn btn-outline btn-sm" onclick="changePassword()">Update Password</button>
          <div id="pw-msg" style="margin-top:8px;font-size:13px;"></div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/appshell.js"></script>
<script>
let currentUser = null;

async function saveProfile() {
  const name = document.getElementById('profile-name').value.trim();
  if (!name) return;
  const res = await API.put('/api/auth/profile', { name });
  const msg = document.getElementById('profile-msg');
  if (res && res.ok) { msg.textContent = '✓ Saved'; msg.style.color='var(--green-mid)'; }
  else { msg.textContent = 'Failed to save'; msg.style.color='var(--red)'; }
}

async function changePassword() {
  const np = document.getElementById('new-password').value;
  const cp = document.getElementById('confirm-password').value;
  const msg = document.getElementById('pw-msg');
  if (np !== cp) { msg.textContent = 'Passwords do not match'; msg.style.color='var(--red)'; return; }
  if (np.length < 8) { msg.textContent = 'Password must be 8+ characters'; msg.style.color='var(--red)'; return; }
  const res = await API.put('/api/auth/password', { password: np });
  if (res && res.ok) { msg.textContent = '✓ Password updated'; msg.style.color='var(--green-mid)'; document.getElementById('new-password').value=''; document.getElementById('confirm-password').value=''; }
  else { msg.textContent = 'Failed to update password'; msg.style.color='var(--red)'; }
}

async function openBillingPortal() {
  const btn = document.getElementById('billing-btn');
  btn.textContent='Loading…'; btn.disabled=true;
  const res = await API.get('/api/subscriptions/portal');
  if (res && res.ok) { const { url } = await res.json(); window.location.href = url; }
  else { btn.textContent='Manage Billing →'; btn.disabled=false; alert('Billing portal unavailable. Contact support.'); }
}

(async () => {
  currentUser = await initApp();
  if (!currentUser) return;
  document.getElementById('profile-name').value  = currentUser.name;
  document.getElementById('profile-email').value = currentUser.email;

  const planNames = { individual:'Individual ($9.99/mo)', team:'Team ($39.99/mo)' };
  document.getElementById('sub-plan').textContent = planNames[currentUser.subscription_plan] || (currentUser.role === 'team_member' ? 'Team Member' : 'No active plan');

  const status = currentUser.subscription_status;
  const statusEl = document.getElementById('sub-status');
  statusEl.innerHTML = `<span class="badge badge-${status==='active'?'active':'inactive'}">${status || 'inactive'}</span>`;
  if (status !== 'active' && currentUser.role !== 'team_member') {
    document.getElementById('sub-inactive-msg').style.display='block';
    document.getElementById('billing-btn').style.display='none';
  }
})();
</script>
</body>
</html>
